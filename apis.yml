apis:
  - aid: https://raw.githubusercontent.com/api-evangelist/bls/refs/heads/main/apis.yml:bls-public-data-api
    name: BLS Public Data API
    description: >-
      The BLS Public Data API is the primary REST interface for retrieving
      published historical time-series data across all BLS statistical programs.
      Version 1.0 is available without registration and supports up to 25 series
      per request and 10 years of data per query. Version 2.0 requires free
      registration and expands limits to 50 series per request and 20 years of
      data, while adding support for catalog metadata, net and percent change
      calculations, optional annual averages, and multi-series batch requests.
      Data is returned in JSON format via HTTPS GET or POST requests.
    humanURL: https://www.bls.gov/developers/home.htm
    baseURL: https://api.bls.gov/publicAPI/v2
