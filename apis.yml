name: Bureau of Labor Statistics
description: >-
  The Bureau of Labor Statistics (BLS) Public Data API provides developers
  programmatic access to the full catalog of official federal labor and economic
  statistics published by the U.S. Department of Labor. The API delivers
  historical time-series data spanning employment, unemployment rates, Consumer
  Price Index (CPI), Producer Price Index (PPI), wages and earnings, and
  productivity metrics drawn from major BLS surveys. Two versions are available:
  an unauthenticated Version 1.0 suitable for lightweight exploration and an
  enhanced Version 2.0 that requires free registration and returns richer
  results including catalog metadata, statistical calculations, and annual
  averages. Responses are served in JSON format, and the API is freely available
  to the public with no cost for access.
